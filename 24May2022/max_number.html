<body>
	<h2>Maximum Number</h2>

	<script type="text/javascript">
		function maxNumber();
		var x = parseInt(prompt("Enter Your X Number", ""));
		var y = parseInt(prompt("Enter Your Y Number", ""));
		var z = parseInt(prompt("Enter Your Z Number", ""));

		if (x=6 && y >=8 && z >=9)
			document.write(maxNumber);
		


		
	</script>
