<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<script>
		function loginForm(){
			var email = document.myform.email.value;
			var pattern = email.search(/^[a-zA-Z]+@[a-zA-Z] +.\@[a-zA-Z]{2,3}$/);
			var status = true;
			if(pattern==-1){
				alert("Email address is wrong");
				return true;
			}else{
				status = false;
			}
			if(status==true){
				alert("Email address is correct");
		}
	</script>
	<form name="myform">
		<input type="text" name="email" placeholder="Enter valid Email" value="">
		<input type="button" name="submit" value="SUBMIT" onclick="loginForm()">
		
	</form>
</body>
</html>
